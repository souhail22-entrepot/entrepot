<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scan Entrepôt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;min-height:100vh}
.header{background:#1a5276;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:600}
.badge-offline{background:#e74c3c;color:#fff;font-size:11px;padding:3px 8px;border-radius:10px}
.badge-online{background:#27ae60;color:#fff;font-size:11px;padding:3px 8px;border-radius:10px}
.container{padding:14px;max-width:500px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-title{font-size:13px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:#444;margin-bottom:5px;font-weight:500}
.field select,.field input{width:100%;padding:11px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;background:#fff;-webkit-appearance:none;appearance:none}
.field select:focus,.field input:focus{outline:none;border-color:#1a5276}
.scan-zone{display:flex;gap:8px;align-items:center}
.scan-zone input{flex:1}
.btn-scan{background:#1a5276;color:#fff;border:none;border-radius:8px;padding:11px 14px;font-size:20px;cursor:pointer}
.btn-scan:active{opacity:.8}
#ref-result{margin-top:6px;font-size:13px;color:#27ae60;font-weight:500;min-height:18px}
#ref-result.error{color:#e74c3c}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.type-btn{padding:10px;border:1.5px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;text-align:center;transition:all .15s}
.type-btn.active-sortie{border-color:#e74c3c;background:#fef0f0;color:#c0392b;font-weight:600}
.type-btn.active-entree{border-color:#27ae60;background:#eafaf1;color:#1e8449;font-weight:600}
.type-btn.active-retour{border-color:#2980b9;background:#eaf4fb;color:#1a5276;font-weight:600}
.type-btn.active-ajust{border-color:#f39c12;background:#fef9e7;color:#b7770d;font-weight:600}
.type-btn.active-transfert{border-color:#8e44ad;background:#f5eef8;color:#6c3483;font-weight:600}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-row button{width:44px;height:44px;border-radius:8px;border:1.5px solid #ddd;background:#f5f5f5;font-size:22px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.qty-row button:active{background:#ddd}
.qty-row input{flex:1;text-align:center;font-size:22px;font-weight:600}
.btn-preview{width:100%;background:#2980b9;color:#fff;border:none;border-radius:10px;padding:15px;font-size:17px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-preview:active{opacity:.85}
.queue-bar{background:#fff;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.queue-count{font-size:13px;color:#555}
.queue-count strong{color:#1a5276;font-size:16px}
.btn-sync{background:#1a5276;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:500;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2c3e50;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;max-width:300px;text-align:center;z-index:999}
.toast.show{opacity:1}
#video-container{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:100;flex-direction:column;align-items:center;justify-content:center}
#video-container.active{display:flex}
#scanner-video{width:100%;max-width:400px}
.scan-overlay{position:absolute;border:3px solid #fff;width:260px;height:120px;border-radius:8px;pointer-events:none}
.btn-close-scan{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.2);color:#fff;border:2px solid #fff;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.scan-hint{color:#fff;font-size:14px;margin-top:140px;text-align:center;padding:0 20px}
.transfert-fields{display:none}
.transfert-arrow{text-align:center;font-size:22px;color:#8e44ad;margin:4px 0}

/* MODAL CONFIRMATION */
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 16px}
.modal-title{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:14px;text-align:center}
.preview-card{border-radius:12px;overflow:hidden;border:1.5px solid #eee;margin-bottom:14px}
.preview-header{padding:12px 14px;display:flex;align-items:center;gap:10px}
.preview-header .type-badge{font-size:12px;font-weight:700;padding:4px 12px;border-radius:20px}
.preview-photo{width:100%;height:140px;object-fit:cover;background:#f0f0f0;display:flex;align-items:center;justify-content:center}
.preview-photo img{width:100%;height:140px;object-fit:cover}
.preview-photo-placeholder{width:100%;height:140px;background:linear-gradient(135deg,#eef2f7,#dde4ed);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.preview-photo-placeholder span{font-size:36px}
.preview-photo-placeholder p{font-size:12px;color:#888}
.preview-body{padding:14px}
.preview-row{display:flex;justify-content:space-between;align-items:flex-start;padding:7px 0;border-bottom:1px solid #f5f5f5}
.preview-row:last-child{border-bottom:none}
.preview-label{font-size:12px;color:#888;font-weight:500}
.preview-value{font-size:14px;color:#1a1a1a;font-weight:600;text-align:right;max-width:60%}
.preview-qty{font-size:28px;font-weight:800;color:#1a5276;text-align:center;padding:10px 0}
.preview-transfert{background:#f5eef8;border-radius:8px;padding:10px 12px;margin:8px 0;text-align:center}
.preview-transfert .arrow{font-size:18px;color:#8e44ad;margin:4px 0}
.preview-transfert .proj{font-size:13px;font-weight:600;color:#6c3483}
.modal-btns{display:flex;gap:10px;margin-top:6px}
.btn-confirm{flex:1;background:#375623;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:600;cursor:pointer}
.btn-confirm:active{opacity:.85}
.btn-edit{flex:0 0 auto;background:#fff;color:#555;border:1.5px solid #ddd;border-radius:10px;padding:14px 18px;font-size:14px;cursor:pointer}
</style>
</head>
<body>

<div class="header">
  <h1>📦 Scan Entrepôt</h1>
  <span id="status-badge" class="badge-offline">Hors ligne</span>
</div>

<div id="video-container">
  <video id="scanner-video" autoplay playsinline></video>
  <div class="scan-overlay"></div>
  <button class="btn-close-scan" onclick="stopScanner()">✕</button>
  <p class="scan-hint">Pointez la caméra vers le code-barre</p>
</div>

<!-- MODAL CONFIRMATION -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Confirmer le mouvement</div>
    <div class="preview-card">
      <div class="preview-header" id="prev-header"></div>
      <div id="prev-photo"></div>
      <div class="preview-body" id="prev-body"></div>
    </div>
    <div class="modal-btns">
      <button class="btn-edit" onclick="fermerModal()">✏️ Modifier</button>
      <button class="btn-confirm" onclick="confirmerEnregistrement()">✓ Confirmer</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">Produit</div>
    <div class="field">
      <label>Scanner ou saisir la référence</label>
      <div class="scan-zone">
        <input type="text" id="ref-input" placeholder="MAT-001" oninput="rechercherRef(this.value)">
        <button class="btn-scan" onclick="startScanner()">📷</button>
      </div>
      <div id="ref-result"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Type de mouvement</div>
    <div class="type-grid">
      <button class="type-btn active-sortie" onclick="setType('Sortie',this)">Sortie</button>
      <button class="type-btn" onclick="setType('Entrée Magasin',this)">Entrée</button>
      <button class="type-btn" onclick="setType('Retour',this)">Retour</button>
      <button class="type-btn" onclick="setType('Ajustement',this)">Ajustement</button>
      <button class="type-btn" onclick="setType('Transfert',this)" style="grid-column:span 2">Transfert projet → projet</button>
    </div>
  </div>

  <div class="card" id="card-projet">
    <div class="card-title" id="projet-titre">Projet</div>
    <div class="field" id="field-projet-normal">
      <select id="sel-projet">
        <option value="">— Sélectionner un projet —</option>
      </select>
    </div>
    <div class="transfert-fields" id="transfert-fields">
      <div class="field">
        <label>Projet source (d'où vient le matériel)</label>
        <select id="sel-projet-source">
          <option value="">— Projet source —</option>
        </select>
      </div>
      <div class="transfert-arrow">↓</div>
      <div class="field">
        <label>Projet destination (vers où va le matériel)</label>
        <select id="sel-projet-dest">
          <option value="">— Projet destination —</option>
        </select>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Quantité</div>
    <div class="qty-row">
      <button onclick="changeQty(-1)">−</button>
      <input type="number" id="qty-input" value="1" min="0.1" step="0.5">
      <button onclick="changeQty(1)">+</button>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Opérateur</div>
    <div class="field">
      <select id="sel-operateur">
        <option value="">— Sélectionner —</option>
      </select>
    </div>
    <div class="field" style="margin-top:8px">
      <label>Observations (optionnel)</label>
      <input type="text" id="obs-input" placeholder="Note...">
    </div>
  </div>

  <button class="btn-preview" onclick="ouvrirPreview()">Aperçu avant enregistrement →</button>

  <div style="height:14px"></div>

  <div class="queue-bar">
    <div class="queue-count">En attente : <strong id="queue-count">0</strong></div>
    <button class="btn-sync" id="btn-sync" onclick="synchroniser()">Synchroniser</button>
  </div>

</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js"></script>

function init() {
  const selects = ['sel-projet','sel-projet-source','sel-projet-dest'];
  selects.forEach(id => {
    const s = document.getElementById(id);
    PROJETS.forEach(p => {
      const o = document.createElement('option');
      o.value = p.code;
      o.textContent = p.code + ' — ' + p.nom;
      s.appendChild(o);
    });
  });
  const so = document.getElementById('sel-operateur');
  CHEFS.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c; so.appendChild(o);
  });
  updateQueueCount();
  checkOnline();
  setInterval(checkOnline, 10000);
}

function checkOnline() {
  const b = document.getElementById('status-badge');
  if (navigator.onLine && SCRIPT_URL !== "") {
    b.className = 'badge-online'; b.textContent = 'En ligne';
    document.getElementById('btn-sync').disabled = false;
  } else {
    b.className = 'badge-offline'; b.textContent = 'Hors ligne';
  }
}

function setType(t, el) {
  typeMouvement = t;
  document.querySelectorAll('.type-btn').forEach(b => b.className = 'type-btn');
  const cls = {'Sortie':'active-sortie','Entrée Magasin':'active-entree','Retour':'active-retour','Ajustement':'active-ajust','Transfert':'active-transfert'};
  el.classList.add(cls[t] || '');

  const isTransfert = t === 'Transfert';
  const needsProjet = t !== 'Entrée Magasin' && t !== 'Ajustement';

  document.getElementById('card-projet').style.opacity = needsProjet ? '1' : '0.4';
  document.getElementById('field-projet-normal').style.display = isTransfert ? 'none' : 'block';
  document.getElementById('transfert-fields').style.display = isTransfert ? 'block' : 'none';
  document.getElementById('projet-titre').textContent = isTransfert ? 'Projets (transfert)' : 'Projet';
}

function rechercherRef(val) {
  const r = document.getElementById('ref-result');
  val = val.trim().toUpperCase();
  if (!val) { r.textContent = ''; return; }
  const p = PRODUITS.find(x => x.ref.toUpperCase() === val);
  if (p) { r.className = ''; r.textContent = '✓ ' + p.nom + ' · ' + p.cat; }
  else { r.className = 'error'; r.textContent = 'Référence introuvable'; }
}

function changeQty(d) {
  const i = document.getElementById('qty-input');
  i.value = Math.max(0.5, (parseFloat(i.value) || 0) + d);
}

function startScanner() {
  document.getElementById('video-container').classList.add('active');
  const codeReader = new ZXing.BrowserMultiFormatReader();
  scanner = codeReader;
  codeReader.decodeFromConstraints({video:{facingMode:'environment'}},'scanner-video',(result,err)=>{
    if (result) {
      const code = result.getText();
      stopScanner();
      document.getElementById('ref-input').value = code;
      rechercherRef(code);
      showToast('Code scanné : ' + code);
    }
  });
}

function stopScanner() {
  if (scanner) { try { scanner.reset(); } catch(e){} scanner = null; }
  document.getElementById('video-container').classList.remove('active');
}

// ========================
// APERÇU AVANT CONFIRMATION
// ========================
function ouvrirPreview() {
  const ref = document.getElementById('ref-input').value.trim();
  const qty = parseFloat(document.getElementById('qty-input').value);
  const oper = document.getElementById('sel-operateur').value;

  if (!ref) { showToast('Scannez ou saisissez une référence'); return; }
  if (!qty || qty <= 0) { showToast('Quantité invalide'); return; }
  if (!oper) { showToast('Sélectionnez un opérateur'); return; }

  if (typeMouvement === 'Transfert') {
    const src = document.getElementById('sel-projet-source').value;
    const dst = document.getElementById('sel-projet-dest').value;
    if (!src || !dst) { showToast('Sélectionnez les deux projets'); return; }
    if (src === dst) { showToast('Projets source et destination identiques'); return; }
  }

  const prod = PRODUITS.find(x => x.ref.toUpperCase() === ref.toUpperCase());
  const color = prod ? (CAT_COLORS[prod.cat] || '#2c3e50') : '#2c3e50';
  const icon = prod ? (CAT_ICONS[prod.cat] || '📦') : '📦';
  const typeColor = TYPE_COLORS[typeMouvement] || '#555';

  // Header
  document.getElementById('prev-header').innerHTML = `
    <div style="width:40px;height:40px;background:${color};border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">${icon}</div>
    <div style="flex:1">
      <div style="font-size:15px;font-weight:700;color:#1a1a1a">${prod ? prod.nom.substring(0,40) + (prod.nom.length>40?'…':'') : ref}</div>
      <div style="font-size:12px;color:#888;margin-top:2px">${prod ? prod.cat : ''} · ${ref}</div>
    </div>
    <span class="type-badge" style="background:${typeColor}20;color:${typeColor};border:1px solid ${typeColor}40">${typeMouvement}</span>`;

  // Photo placeholder (avec icône catégorie)
  document.getElementById('prev-photo').innerHTML = `
    <div class="preview-photo-placeholder">
      <span style="font-size:48px">${icon}</span>
      <p>Aucune photo disponible</p>
    </div>`;

  // Corps du résumé
  let projetHTML = '';
  if (typeMouvement === 'Transfert') {
    const srcCode = document.getElementById('sel-projet-source').value;
    const dstCode = document.getElementById('sel-projet-dest').value;
    const srcNom = PROJETS.find(p=>p.code===srcCode)?.nom || srcCode;
    const dstNom = PROJETS.find(p=>p.code===dstCode)?.nom || dstCode;
    projetHTML = `<div class="preview-transfert">
      <div class="proj">📤 ${srcCode} — ${srcNom}</div>
      <div class="arrow">↓ transfert</div>
      <div class="proj">📥 ${dstCode} — ${dstNom}</div>
    </div>`;
  } else {
    const codeProjet = document.getElementById('sel-projet').value;
    const nomProjet = codeProjet ? (PROJETS.find(p=>p.code===codeProjet)?.nom || '') : '—';
    projetHTML = `<div class="preview-row">
      <span class="preview-label">Projet</span>
      <span class="preview-value">${codeProjet ? codeProjet+' — '+nomProjet : '—'}</span>
    </div>`;
  }

  const unite = prod ? prod.unite : '';
  const obs = document.getElementById('obs-input').value;

  document.getElementById('prev-body').innerHTML = `
    <div class="preview-qty">${qty} <span style="font-size:16px;color:#888">${unite}</span></div>
    ${projetHTML}
    <div class="preview-row">
      <span class="preview-label">Opérateur</span>
      <span class="preview-value">${oper}</span>
    </div>
    <div class="preview-row">
      <span class="preview-label">Date / heure</span>
      <span class="preview-value">${new Date().toLocaleString('fr-CA',{hour12:false})}</span>
    </div>
    ${obs ? `<div class="preview-row"><span class="preview-label">Observations</span><span class="preview-value">${obs}</span></div>` : ''}
    ${typeMouvement==='Transfert' ? '<div style="font-size:11px;color:#8e44ad;text-align:center;margin-top:8px">⚡ Génère 2 mouvements : Retour + Sortie</div>' : ''}`;

  document.getElementById('modal-overlay').classList.add('active');
}

function fermerModal() {
  document.getElementById('modal-overlay').classList.remove('active');
}

function confirmerEnregistrement() {
  fermerModal();
  const ref = document.getElementById('ref-input').value.trim();
  const qty = parseFloat(document.getElementById('qty-input').value);
  const oper = document.getElementById('sel-operateur').value;
  const obs = document.getElementById('obs-input').value;
  const prod = PRODUITS.find(x => x.ref.toUpperCase() === ref.toUpperCase());
  const now = new Date().toISOString();

  if (typeMouvement === 'Transfert') {
    const srcCode = document.getElementById('sel-projet-source').value;
    const dstCode = document.getElementById('sel-projet-dest').value;
    // Mouvement 1 : Retour depuis projet source
    queue.push({id:Date.now(), date:now, ref:prod?prod.ref:ref, nom:prod?prod.nom:ref,
      type:'Retour', projet:srcCode, qte:qty, operateur:oper,
      obs:'[Transfert→'+dstCode+'] '+obs, synced:false});
    // Mouvement 2 : Sortie vers projet destination
    queue.push({id:Date.now()+1, date:now, ref:prod?prod.ref:ref, nom:prod?prod.nom:ref,
      type:'Sortie', projet:dstCode, qte:qty, operateur:oper,
      obs:'[Transfert de '+srcCode+'] '+obs, synced:false});
  } else {
    const codeProjet = (typeMouvement==='Sortie'||typeMouvement==='Retour')
      ? document.getElementById('sel-projet').value : '';
    queue.push({id:Date.now(), date:now, ref:prod?prod.ref:ref, nom:prod?prod.nom:ref,
      type:typeMouvement, projet:codeProjet, qte:qty, operateur:oper, obs:obs, synced:false});
  }

  localStorage.setItem('mvQueue', JSON.stringify(queue));
  updateQueueCount();

  // Reset
  document.getElementById('ref-input').value = '';
  document.getElementById('ref-result').textContent = '';
  document.getElementById('qty-input').value = '1';
  document.getElementById('obs-input').value = '';
  showToast(typeMouvement==='Transfert' ? '✓ 2 mouvements enregistrés' : '✓ Mouvement enregistré');

  if (navigator.onLine && SCRIPT_URL !== "") synchroniser();
}

function updateQueueCount() {
  document.getElementById('queue-count').textContent = queue.filter(x=>!x.synced).length;
}

async function synchroniser() {
  const unsync = queue.filter(x=>!x.synced);
  if (!unsync.length) { showToast('Aucun mouvement à synchroniser'); return; }
  const btn = document.getElementById('btn-sync');
  btn.textContent = '...'; btn.disabled = true;
  try {
    const resp = await fetch(SCRIPT_URL, {method:'POST',
      body: JSON.stringify({mouvements:unsync}),
      headers:{'Content-Type':'text/plain'}});
    const data = await resp.json();
    if (data.status === 'ok') {
      queue = queue.map(x=>({...x,synced:true}));
      localStorage.setItem('mvQueue', JSON.stringify(queue));
      updateQueueCount();
      showToast('✓ '+unsync.length+' mouvement(s) synchronisé(s)');
    } else { showToast('Erreur : '+(data.message||'?')); }
  } catch(e) { showToast('Hors ligne — données conservées'); }
  btn.textContent = 'Synchroniser'; btn.disabled = false;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2800);
}

window.addEventListener('load', init);
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Scan Entrepôt</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:#f0f2f5;min-height:100vh}
.header{background:#1a5276;color:#fff;padding:14px 16px;display:flex;align-items:center;justify-content:space-between}
.header h1{font-size:17px;font-weight:600}
.badge-offline{background:#e74c3c;color:#fff;font-size:11px;padding:3px 8px;border-radius:10px}
.badge-online{background:#27ae60;color:#fff;font-size:11px;padding:3px 8px;border-radius:10px}
.container{padding:14px;max-width:500px;margin:0 auto}
.card{background:#fff;border-radius:12px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.card-title{font-size:13px;font-weight:600;color:#555;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.field{margin-bottom:12px}
.field label{display:block;font-size:13px;color:#444;margin-bottom:5px;font-weight:500}
.field select,.field input{width:100%;padding:11px 12px;border:1.5px solid #ddd;border-radius:8px;font-size:15px;background:#fff;-webkit-appearance:none;appearance:none}
.scan-zone{display:flex;gap:8px;align-items:center}
.scan-zone input{flex:1}
.btn-scan{background:#1a5276;color:#fff;border:none;border-radius:8px;padding:11px 14px;font-size:20px;cursor:pointer}
#ref-result{margin-top:6px;font-size:13px;color:#27ae60;font-weight:500;min-height:18px}
#ref-result.error{color:#e74c3c}
.type-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.type-btn{padding:10px;border:1.5px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;text-align:center;transition:all .15s}
.type-btn.active-sortie{border-color:#e74c3c;background:#fef0f0;color:#c0392b;font-weight:600}
.type-btn.active-entree{border-color:#27ae60;background:#eafaf1;color:#1e8449;font-weight:600}
.type-btn.active-retour{border-color:#2980b9;background:#eaf4fb;color:#1a5276;font-weight:600}
.type-btn.active-ajust{border-color:#f39c12;background:#fef9e7;color:#b7770d;font-weight:600}
.type-btn.active-transfert{border-color:#8e44ad;background:#f5eef8;color:#6c3483;font-weight:600}
.transfert-fields{display:none;margin-top:12px}
.transfert-arrow{text-align:center;font-size:20px;color:#8e44ad;margin:4px 0}
.qty-row{display:flex;align-items:center;gap:10px}
.qty-row button{width:44px;height:44px;border-radius:8px;border:1.5px solid #ddd;background:#f5f5f5;font-size:22px;cursor:pointer}
.qty-row input{flex:1;text-align:center;font-size:22px;font-weight:600}
/* SÉLECTEUR D'UNITÉ */
.unite-toggle{display:none;margin:10px 0 12px}
.unite-toggle-label{font-size:12px;color:#888;margin-bottom:6px}
.unite-btns{display:flex;gap:8px}
.unite-btn{flex:1;padding:9px;border:1.5px solid #ddd;border-radius:8px;background:#fff;font-size:13px;cursor:pointer;text-align:center;transition:all .15s;color:#555}
.unite-btn.active{border-color:#1a5276;background:#e6f1fb;color:#1a5276;font-weight:600}
.unite-hint{font-size:11px;color:#888;text-align:center;margin-top:4px}
.btn-add{width:100%;background:#1a5276;color:#fff;border:none;border-radius:10px;padding:13px;font-size:16px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-add:active{opacity:.85}
.panier-badge{background:#1a5276;color:#fff;font-size:12px;padding:2px 10px;border-radius:10px;font-weight:700}
.panier-empty{text-align:center;color:#bbb;font-size:14px;padding:12px 0}
.panier-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.panier-item:last-child{border-bottom:none}
.panier-icon{width:38px;height:38px;border-radius:9px;overflow:hidden;flex-shrink:0}
.panier-info{flex:1;min-width:0}
.panier-nom{font-size:13px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.panier-meta{font-size:12px;color:#888;margin-top:2px}
.panier-qty{font-size:15px;font-weight:800;color:#1a5276;white-space:nowrap;text-align:right}
.panier-qty-unite{font-size:11px;color:#888;font-weight:400}
.btn-del{background:none;border:none;color:#e74c3c;font-size:20px;cursor:pointer;padding:4px;flex-shrink:0}
.panier-total{display:flex;justify-content:space-between;align-items:center;padding-top:10px;margin-top:6px;border-top:1.5px solid #eee}
.panier-total-label{font-size:13px;color:#555;font-weight:600}
.panier-total-val{font-size:16px;font-weight:800;color:#1a5276}
.btn-preview{width:100%;background:#375623;color:#fff;border:none;border-radius:10px;padding:15px;font-size:17px;font-weight:600;cursor:pointer;margin-top:4px}
.btn-preview:disabled{opacity:.35;cursor:not-allowed}
.queue-bar{background:#fff;border-radius:10px;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 1px 4px rgba(0,0,0,.08)}
.queue-count{font-size:13px;color:#555}
.queue-count strong{color:#1a5276;font-size:16px}
.btn-sync{background:#1a5276;color:#fff;border:none;border-radius:8px;padding:9px 16px;font-size:14px;font-weight:500;cursor:pointer}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#2c3e50;color:#fff;padding:12px 20px;border-radius:10px;font-size:14px;opacity:0;transition:opacity .3s;pointer-events:none;max-width:300px;text-align:center;z-index:999}
.toast.show{opacity:1}
#video-container{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:100;flex-direction:column;align-items:center;justify-content:center}
#video-container.active{display:flex}
#scanner-video{width:100%;max-width:400px}
.scan-overlay{position:absolute;border:3px solid #fff;width:260px;height:120px;border-radius:8px;pointer-events:none}
.btn-close-scan{position:absolute;top:20px;right:20px;background:rgba(255,255,255,.2);color:#fff;border:2px solid #fff;border-radius:50%;width:44px;height:44px;font-size:20px;cursor:pointer}
.scan-hint{color:#fff;font-size:14px;margin-top:140px;text-align:center;padding:0 20px}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.55);z-index:200;align-items:flex-end;justify-content:center}
.modal-overlay.active{display:flex}
.modal-sheet{background:#fff;border-radius:20px 20px 0 0;padding:20px;width:100%;max-width:500px;max-height:88vh;overflow-y:auto}
.modal-handle{width:40px;height:4px;background:#ddd;border-radius:2px;margin:0 auto 14px}
.modal-title{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:4px;text-align:center}
.modal-subtitle{font-size:13px;color:#888;text-align:center;margin-bottom:14px}
.modal-session{background:#f8f9fa;border-radius:10px;padding:10px 14px;margin-bottom:12px;display:flex;gap:10px;flex-wrap:wrap}
.modal-session-item{font-size:12px}
.modal-session-item span{color:#888}
.modal-session-item strong{color:#1a1a1a}
.modal-items{margin-bottom:14px}
.modal-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0}
.modal-item:last-child{border-bottom:none}
.modal-item-info{flex:1;min-width:0}
.modal-item-nom{font-size:13px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.modal-item-ref{font-size:11px;color:#aaa}
.modal-item-qty{font-size:16px;font-weight:800;color:#1a5276;white-space:nowrap}
.modal-item-unite{font-size:11px;color:#888;font-weight:400}
.modal-total{display:flex;justify-content:space-between;background:#eaf4fb;border-radius:10px;padding:12px 14px;margin-bottom:14px}
.modal-total-label{font-size:14px;color:#1a5276;font-weight:600}
.modal-total-val{font-size:18px;font-weight:800;color:#1a5276}
.modal-btns{display:flex;gap:10px}
.btn-confirm{flex:1;background:#375623;color:#fff;border:none;border-radius:10px;padding:14px;font-size:16px;font-weight:600;cursor:pointer}
.btn-edit{background:#fff;color:#555;border:1.5px solid #ddd;border-radius:10px;padding:14px 18px;font-size:14px;cursor:pointer}
.transfert-badge{background:#f5eef8;color:#6c3483;border-radius:8px;padding:6px 10px;font-size:12px;text-align:center;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
  <h1>📦 Scan Entrepôt</h1>
  <span id="status-badge" class="badge-offline">Hors ligne</span>
</div>

<div id="video-container">
  <video id="scanner-video" autoplay playsinline></video>
  <div class="scan-overlay"></div>
  <button class="btn-close-scan" onclick="stopScanner()">✕</button>
  <p class="scan-hint">Pointez la caméra vers le code-barre</p>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Aperçu du panier</div>
    <div class="modal-subtitle" id="modal-subtitle"></div>
    <div class="modal-session" id="modal-session"></div>
    <div id="modal-transfert-badge" style="display:none" class="transfert-badge">⚡ Chaque article génère 2 mouvements : Retour + Sortie</div>
    <div class="modal-items" id="modal-items"></div>
    <div class="modal-total">
      <span class="modal-total-label">Total lignes</span>
      <span class="modal-total-val" id="modal-total-val"></span>
    </div>
    <div class="modal-btns">
      <button class="btn-edit" onclick="fermerModal()">✏️ Modifier</button>
      <button class="btn-confirm" onclick="confirmerPanier()">✓ Tout confirmer</button>
    </div>
  </div>
</div>

<div class="container">

  <div class="card">
    <div class="card-title">Réglages de session</div>
    <div class="type-grid">
      <button class="type-btn active-sortie" onclick="setType('Sortie',this)">Sortie</button>
      <button class="type-btn" onclick="setType('Entrée Magasin',this)">Entrée</button>
      <button class="type-btn" onclick="setType('Retour',this)">Retour</button>
      <button class="type-btn" onclick="setType('Ajustement',this)">Ajustement</button>
      <button class="type-btn" onclick="setType('Transfert',this)" style="grid-column:span 2">Transfert projet → projet</button>
    </div>
    <div style="margin-top:12px" id="field-projet-normal">
      <div class="field" style="margin-bottom:8px">
        <label>Projet</label>
        <select id="sel-projet"><option value="">— Sélectionner —</option></select>
      </div>
    </div>
    <div class="transfert-fields" id="transfert-fields">
      <div class="field" style="margin-bottom:4px">
        <label>Projet source</label>
        <select id="sel-projet-source"><option value="">— Source —</option></select>
      </div>
      <div class="transfert-arrow">↓</div>
      <div class="field">
        <label>Projet destination</label>
        <select id="sel-projet-dest"><option value="">— Destination —</option></select>
      </div>
    </div>
    <div class="field" style="margin-top:8px;margin-bottom:0">
      <label>Opérateur</label>
      <select id="sel-operateur"><option value="">— Sélectionner —</option></select>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Ajouter un article</div>
    <div class="field">
      <div class="scan-zone">
        <input type="text" id="ref-input" placeholder="MAT-001 ou scanner" oninput="rechercherRef(this.value)">
        <button class="btn-scan" onclick="startScanner()">📷</button>
      </div>
      <div id="ref-result"></div>
    </div>
    <div class="qty-row" style="margin-bottom:0">
      <button onclick="changeQty(-1)">−</button>
      <input type="number" id="qty-input" value="1" min="0.1" step="0.5">
      <button onclick="changeQty(1)">+</button>
    </div>
    <!-- SÉLECTEUR D'UNITÉ — visible uniquement si 2 unités disponibles -->
    <div class="unite-toggle" id="unite-toggle">
      <div class="unite-toggle-label">Unité de saisie</div>
      <div class="unite-btns">
        <button class="unite-btn active" id="btn-unite-stock" onclick="setUnite('stock')">
          <span id="lbl-unite-stock">Caisse</span>
        </button>
        <button class="unite-btn" id="btn-unite-util" onclick="setUnite('util')">
          <span id="lbl-unite-util">Unité</span>
        </button>
      </div>
      <div class="unite-hint" id="unite-hint"></div>
    </div>
    <div class="field" style="margin-bottom:8px;margin-top:12px">
      <input type="text" id="obs-input" placeholder="Observations (optionnel)">
    </div>
    <button class="btn-add" onclick="ajouterAuPanier()">+ Ajouter au panier</button>
  </div>

  <div class="card">
    <div class="card-title">
      <span>Panier</span>
      <span class="panier-badge" id="panier-badge">0 article</span>
    </div>
    <div id="panier-liste">
      <div class="panier-empty">Aucun article — scannez pour commencer</div>
    </div>
    <div id="panier-total-bar" style="display:none" class="panier-total">
      <span class="panier-total-label">Total articles</span>
      <span class="panier-total-val" id="panier-total-val"></span>
    </div>
  </div>

  <button class="btn-preview" id="btn-preview" onclick="ouvrirApercu()" disabled>
    Voir l'aperçu et confirmer →
  </button>
  <div style="height:14px"></div>
  <div class="queue-bar">
    <div class="queue-count">En attente : <strong id="queue-count">0</strong></div>
    <button class="btn-sync" id="btn-sync" onclick="synchroniser()">Synchroniser</button>
  </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdn.jsdelivr.net/npm/@zxing/library@0.18.6/umd/index.min.js"></script>

const PROJETS = [{"code":"SDC-754","nom":"Nettoyage OMHM - Hab. Madelaine"},{"code":"SDC-740","nom":"Nettoyage OMHM - Hab. Beaubien"},{"code":"SDC-750","nom":"Nettoyage OMHM -Hab. Ste-Véronique"},{"code":"SDC-731","nom":"Nettoyage CC Laval M. Real"},{"code":"SDC-732","nom":"Immeuble Anfa"},{"code":"SDC-733","nom":"Nettoyage"},{"code":"SDC-734","nom":"netoya"},{"code":"SDC-502","nom":"CVCA 1"},{"code":"SDC-503","nom":"CVCA 2"},{"code":"SDC-504","nom":"CVCA 3"},{"code":"SDC-505","nom":"CVCA 4"},{"code":"SDC-506","nom":"CVCA 5"}];
const CHEFS = ["Gonzalo H.","José H.","Cézar T.","Alain B.","Mario"];
const CAT_COLORS = {"Portes d'accès":"#1a5276","Feuille de Tôle":"#784212","Tape":"#1e8449","Plastique":"#6c3483","Sac":"#b7770d","Papier":"#117a65","Masque":"#922b21","Gants":"#154360","EPI":"#2e4057","Tyvec":"#0e6655"};
const CAT_ICONS  = {"Portes d'accès":"🚪","Feuille de Tôle":"🔩","Tape":"📦","Plastique":"🛍️","Sac":"🗑️","Papier":"🧻","Masque":"😷","Gants":"🧤","EPI":"⛑️","Tyvec":"🥼"};

let typeMouvement = "Sortie";
let scanner = null;
let panier = [];
let queue = JSON.parse(localStorage.getItem('mvQueue') || '[]');
let currentUniteMode = 'stock'; // 'stock' ou 'util'
let currentProd = null;

function init() {
  ['sel-projet','sel-projet-source','sel-projet-dest'].forEach(id => {
    const s = document.getElementById(id);
    PROJETS.forEach(p => {
      const o = document.createElement('option');
      o.value = p.code; o.textContent = p.code + ' — ' + p.nom; s.appendChild(o);
    });
  });
  const so = document.getElementById('sel-operateur');
  CHEFS.forEach(c => { const o = document.createElement('option'); o.value=c; o.textContent=c; so.appendChild(o); });
  updateQueueCount(); checkOnline(); setInterval(checkOnline, 10000);
}

function checkOnline() {
  const b = document.getElementById('status-badge');
  if (navigator.onLine && SCRIPT_URL !== "") {
    b.className='badge-online'; b.textContent='En ligne';
    document.getElementById('btn-sync').disabled = false;
  } else { b.className='badge-offline'; b.textContent='Hors ligne'; }
}

function setType(t, el) {
  typeMouvement = t;
  document.querySelectorAll('.type-btn').forEach(b => b.className='type-btn');
  const cls = {'Sortie':'active-sortie','Entrée Magasin':'active-entree','Retour':'active-retour','Ajustement':'active-ajust','Transfert':'active-transfert'};
  el.classList.add(cls[t]||'');
  const isT = t==='Transfert', needP = t!=='Entrée Magasin' && t!=='Ajustement';
  document.getElementById('field-projet-normal').style.display = isT?'none':(needP?'block':'none');
  document.getElementById('transfert-fields').style.display = isT?'block':'none';
}

function rechercherRef(val) {
  const r = document.getElementById('ref-result');
  val = val.trim().toUpperCase();
  if (!val) { r.textContent=''; cacherUniteToggle(); currentProd=null; return; }
  const p = PRODUITS.find(x => x.ref.toUpperCase()===val);
  if (p) {
    r.className=''; r.textContent='✓ ' + p.nom + ' · ' + p.cat;
    currentProd = p;
    afficherUniteToggle(p);
  } else { r.className='error'; r.textContent='Référence introuvable'; cacherUniteToggle(); currentProd=null; }
}

function afficherUniteToggle(p) {
  const toggle = document.getElementById('unite-toggle');
  if (!p.uniteUtil) { cacherUniteToggle(); return; }
  document.getElementById('lbl-unite-stock').textContent = p.unite;
  document.getElementById('lbl-unite-util').textContent  = p.uniteUtil;
  document.getElementById('unite-hint').textContent = '1 ' + p.unite + ' = ' + p.facteur + ' ' + p.uniteUtil;
  toggle.style.display = 'block';
  setUnite('stock'); // reset au stock par défaut
}

function cacherUniteToggle() {
  document.getElementById('unite-toggle').style.display = 'none';
  currentUniteMode = 'stock';
}

function setUnite(mode) {
  currentUniteMode = mode;
  document.getElementById('btn-unite-stock').classList.toggle('active', mode==='stock');
  document.getElementById('btn-unite-util').classList.toggle('active',  mode==='util');
}

function getUniteSaisie() {
  if (!currentProd) return 'Unité stock';
  if (!currentProd.uniteUtil) return currentProd.unite;
  return currentUniteMode === 'stock' ? currentProd.unite : currentProd.uniteUtil;
}

function changeQty(d) {
  const i = document.getElementById('qty-input');
  i.value = Math.max(0.5, (parseFloat(i.value)||0) + d);
}

function startScanner() {
  document.getElementById('video-container').classList.add('active');
  const codeReader = new ZXing.BrowserMultiFormatReader();
  scanner = codeReader;
  codeReader.decodeFromConstraints({video:{facingMode:'environment'}},'scanner-video',(result)=>{
    if (result) {
      const code = result.getText(); stopScanner();
      document.getElementById('ref-input').value = code;
      rechercherRef(code); showToast('Code scanné : ' + code);
    }
  });
}

function stopScanner() {
  if (scanner) { try{scanner.reset();}catch(e){} scanner=null; }
  document.getElementById('video-container').classList.remove('active');
}

function getPhotoHTML(ref, color, icon, size, r) {
  return `<img src="${PHOTO_BASE}${ref}.jpg" width="${size}" height="${size}"
    style="object-fit:cover;border-radius:${r};flex-shrink:0;display:block"
    onerror="this.outerHTML='<div style=width:${size}px;height:${size}px;border-radius:${r};background:${color}20;display:flex;align-items:center;justify-content:center;font-size:${Math.round(size*0.5)}px>${icon}</div>'">`;
}

function ajouterAuPanier() {
  const ref = document.getElementById('ref-input').value.trim();
  const qty = parseFloat(document.getElementById('qty-input').value);
  const obs = document.getElementById('obs-input').value;
  if (!ref) { showToast('Scannez ou saisissez une référence'); return; }
  if (!qty||qty<=0) { showToast('Quantité invalide'); return; }
  const prod = PRODUITS.find(x=>x.ref.toUpperCase()===ref.toUpperCase());
  const uniteSaisie = getUniteSaisie();
  const uniteAffichee = (prod && currentUniteMode==='util' && prod.uniteUtil) ? prod.uniteUtil : (prod?prod.unite:'');

  panier.push({
    id: Date.now(), ref: prod?prod.ref:ref, nom: prod?prod.nom:ref,
    cat: prod?prod.cat:'', unite: uniteAffichee,
    uniteSaisie: uniteSaisie, qte: qty, obs: obs
  });

  document.getElementById('ref-input').value = '';
  document.getElementById('ref-result').textContent = '';
  document.getElementById('qty-input').value = '1';
  document.getElementById('obs-input').value = '';
  cacherUniteToggle(); currentProd = null;
  afficherPanier(); showToast('✓ Ajouté au panier');
}

function supprimerDuPanier(id) {
  panier = panier.filter(x=>x.id!==id); afficherPanier();
}

function afficherPanier() {
  const liste = document.getElementById('panier-liste');
  const badge = document.getElementById('panier-badge');
  const totalBar = document.getElementById('panier-total-bar');
  const btn = document.getElementById('btn-preview');
  badge.textContent = panier.length + ' article' + (panier.length>1?'s':'');
  if (panier.length===0) {
    liste.innerHTML='<div class="panier-empty">Aucun article — scannez pour commencer</div>';
    totalBar.style.display='none'; btn.disabled=true; return;
  }
  liste.innerHTML = panier.map(item => {
    const color = CAT_COLORS[item.cat]||'#2c3e50', icon = CAT_ICONS[item.cat]||'📦';
    const nom = item.nom.length>38?item.nom.substring(0,38)+'…':item.nom;
    const isUtil = item.uniteSaisie !== 'Unité stock';
    return `<div class="panier-item">
      <div class="panier-icon">${getPhotoHTML(item.ref,color,icon,38,'9px')}</div>
      <div class="panier-info">
        <div class="panier-nom">${nom}</div>
        <div class="panier-meta">${item.ref}${item.obs?' · '+item.obs:''}${isUtil?' · <span style="color:#8e44ad">'+item.uniteSaisie+'</span>':''}</div>
      </div>
      <div style="text-align:right">
        <div class="panier-qty">${item.qte} <span class="panier-qty-unite">${item.unite}</span></div>
      </div>
      <button class="btn-del" onclick="supprimerDuPanier(${item.id})">×</button>
    </div>`;
  }).join('');
  document.getElementById('panier-total-val').textContent = panier.length + ' article(s)';
  totalBar.style.display='flex'; btn.disabled=false;
}

function ouvrirApercu() {
  if (panier.length===0) return;
  const oper = document.getElementById('sel-operateur').value;
  if (!oper) { showToast('Sélectionnez un opérateur'); return; }
  const isT = typeMouvement==='Transfert';
  if (isT) {
    const src=document.getElementById('sel-projet-source').value, dst=document.getElementById('sel-projet-dest').value;
    if (!src||!dst){showToast('Sélectionnez les deux projets');return;}
    if (src===dst){showToast('Projets identiques');return;}
    document.getElementById('modal-session').innerHTML=`
      <div class="modal-session-item"><span>Type</span><br><strong>Transfert</strong></div>
      <div class="modal-session-item"><span>De</span><br><strong>${src}</strong></div>
      <div class="modal-session-item"><span>Vers</span><br><strong>${dst}</strong></div>
      <div class="modal-session-item"><span>Opérateur</span><br><strong>${oper}</strong></div>`;
    document.getElementById('modal-transfert-badge').style.display='block';
  } else {
    const codeP=document.getElementById('sel-projet').value;
    document.getElementById('modal-session').innerHTML=`
      <div class="modal-session-item"><span>Type</span><br><strong>${typeMouvement}</strong></div>
      <div class="modal-session-item"><span>Projet</span><br><strong>${codeP||'—'}</strong></div>
      <div class="modal-session-item"><span>Opérateur</span><br><strong>${oper}</strong></div>
      <div class="modal-session-item"><span>Date</span><br><strong>${new Date().toLocaleDateString('fr-CA')}</strong></div>`;
    document.getElementById('modal-transfert-badge').style.display='none';
  }
  document.getElementById('modal-subtitle').textContent = panier.length+' article(s) à enregistrer';
  document.getElementById('modal-items').innerHTML = panier.map(item => {
    const color=CAT_COLORS[item.cat]||'#2c3e50', icon=CAT_ICONS[item.cat]||'📦';
    const nom = item.nom.length>40?item.nom.substring(0,40)+'…':item.nom;
    const isUtil = item.uniteSaisie !== 'Unité stock';
    return `<div class="modal-item">
      ${getPhotoHTML(item.ref,color,icon,52,'8px')}
      <div class="modal-item-info">
        <div class="modal-item-nom">${nom}</div>
        <div class="modal-item-ref">${item.ref}${item.obs?' · '+item.obs:''}${isUtil?' · <span style="color:#8e44ad;font-size:11px">'+item.uniteSaisie+'</span>':''}</div>
      </div>
      <div style="text-align:right">
        <div class="modal-item-qty">${item.qte}</div>
        <div class="modal-item-unite">${item.unite}</div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('modal-total-val').textContent = panier.length+' article(s)';
  document.getElementById('modal-overlay').classList.add('active');
}

function fermerModal() { document.getElementById('modal-overlay').classList.remove('active'); }

function confirmerPanier() {
  fermerModal();
  const oper = document.getElementById('sel-operateur').value;
  const now  = new Date().toLocaleString('fr-CA',{timeZone:'America/Toronto',hour12:false}).replace(',','');
  const isT  = typeMouvement==='Transfert';
  const codeP    = document.getElementById('sel-projet').value;
  const srcCode  = document.getElementById('sel-projet-source').value;
  const dstCode  = document.getElementById('sel-projet-dest').value;

  panier.forEach(item => {
    if (isT) {
      queue.push({id:Date.now(),   date:now, ref:item.ref, nom:item.nom, type:'Retour', projet:srcCode, qte:item.qte, uniteSaisie:item.uniteSaisie, operateur:oper, obs:'[Transfert→'+dstCode+'] '+(item.obs||''), synced:false});
      queue.push({id:Date.now()+1, date:now, ref:item.ref, nom:item.nom, type:'Sortie', projet:dstCode, qte:item.qte, uniteSaisie:item.uniteSaisie, operateur:oper, obs:'[Transfert de '+srcCode+'] '+(item.obs||''), synced:false});
    } else {
      queue.push({id:Date.now(), date:now, ref:item.ref, nom:item.nom, type:typeMouvement, projet:codeP, qte:item.qte, uniteSaisie:item.uniteSaisie, operateur:oper, obs:item.obs||'', synced:false});
    }
  });

  const nbMv = isT?panier.length*2:panier.length;
  localStorage.setItem('mvQueue', JSON.stringify(queue));
  panier=[]; afficherPanier(); updateQueueCount();
  showToast('✓ '+nbMv+' mouvement(s) enregistré(s)');
  if (navigator.onLine && SCRIPT_URL!=="") synchroniser();
}

function updateQueueCount() {
  document.getElementById('queue-count').textContent = queue.filter(x=>!x.synced).length;
}

async function synchroniser() {
  const unsync = queue.filter(x=>!x.synced);
  if (!unsync.length){showToast('Aucun mouvement à synchroniser');return;}
  const btn = document.getElementById('btn-sync');
  btn.textContent='...'; btn.disabled=true;
  try {
    const resp = await fetch(SCRIPT_URL,{method:'POST',body:JSON.stringify({mouvements:unsync}),headers:{'Content-Type':'text/plain'}});
    const data = await resp.json();
    if (data.status==='ok') {
      queue=queue.map(x=>({...x,synced:true}));
      localStorage.setItem('mvQueue',JSON.stringify(queue));
      updateQueueCount(); showToast('✓ '+unsync.length+' mouvement(s) synchronisé(s)');
    } else { showToast('Erreur : '+(data.message||'?')); }
  } catch(e){ showToast('Hors ligne — données conservées'); }
  btn.textContent='Synchroniser'; btn.disabled=false;
}

function showToast(msg) {
  const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

window.addEventListener('load', init);
</script>
